<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Live Queue — Warrantywise</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d1117;
      color: #e6edf3;
      font-family: 'Segoe UI', system-ui, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 24px;
      background: #161b22;
      border-bottom: 1px solid #30363d;
      flex-shrink: 0;
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #3fb950;
      box-shadow: 0 0 6px #3fb950;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    header h1 {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.3px;
      color: #e6edf3;
    }

    header span {
      margin-left: auto;
      font-size: 12px;
      color: #8b949e;
    }

    .panels {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    .panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .panel + .panel {
      border-left: 2px solid #30363d;
    }

    .panel-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: #8b949e;
      padding: 6px 16px;
      background: #161b22;
      border-bottom: 1px solid #30363d;
      flex-shrink: 0;
    }

    iframe {
      flex: 1;
      width: 100%;
      border: none;
      display: block;
    }
  </style>
</head>
<body>

  <header>
    <div class="status-dot"></div>
    <h1>Live Queue · Warrantywise</h1>
    <span id="clock"></span>
  </header>

  <div class="panels">

    <div class="panel">
      <div class="panel-label">Live Dashboard</div>
      <iframe
        id="td-emb-container"
        title="Talkdesk Embedded"
        src="https://prd-cdn-talkdesk.talkdesk.com/talkdesk-embedded/latest/generic/index.html"
        allow="microphone *"
        frameborder="0"
      ></iframe>
    </div>

    <div class="panel">
      <div class="panel-label">Puzzel</div>
      <iframe
        id="puzzel-container"
        title="Puzzel"
        src="https://puzzle-test.revopci.co.uk/"
        allow="microphone *"
        frameborder="0"
      ></iframe>
    </div>

  </div>

  <script>
    // Clock
    function updateClock() {
      const now = new Date();
      document.getElementById('clock').textContent = now.toLocaleTimeString('en-GB');
    }
    updateClock();
    setInterval(updateClock, 1000);

    // Talkdesk Embedded
    const sendEventToTD = (action, data) => {
      let tdEmbContainer = document.getElementById('td-emb-container');
      tdEmbContainer.contentWindow.postMessage({ action, data }, tdEmbContainer.src);
    };

    const eventHandler = (event) => {
      let tdEmbContainer = document.getElementById('td-emb-container');
      if (event.origin !== new URL(tdEmbContainer.src).origin) {
        return;
      }
      console.log("### [custom integration] <<< event received:", event);
    };

    window.onload = () => {
      window.addEventListener('message', eventHandler);

      sendEventToTD('init_td_embedded', {
        url: window.location.origin,
        int: 'custom-integration',
        env: 'prd-eu',
        acc: 'warrantywise',
        aid: 'agent-id-123',
        view: 'headless',
        app: 'live',
        showCtiStatus: 'false'
      });
    };
  </script>

</body>
</html>
