<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Live Queue — Warrantywise</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d1117;
      color: #e6edf3;
      font-family: 'Segoe UI', system-ui, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 24px;
      background: #161b22;
      border-bottom: 1px solid #30363d;
      flex-shrink: 0;
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #3fb950;
      box-shadow: 0 0 6px #3fb950;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    header h1 {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.3px;
      color: #e6edf3;
    }

    header span {
      margin-left: auto;
      font-size: 12px;
      color: #8b949e;
    }

    .embed-container {
      flex: 1;
      overflow: hidden;
    }

    #td-embedded-iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }
  </style>
</head>
<body>

  <header>
    <div class="status-dot"></div>
    <h1>Live Queue · Warrantywise</h1>
    <span id="clock"></span>
  </header>

  <div class="embed-container">
    <iframe
      id="td-embedded-iframe"
      src="https://warrantywise.mytalkdesk.eu/talkdesk-embedded"
      allow="microphone; camera"
      title="Talkdesk Live"
    ></iframe>
  </div>

  <script>
    // Clock
    function updateClock() {
      const now = new Date();
      document.getElementById('clock').textContent = now.toLocaleTimeString('en-GB');
    }
    updateClock();
    setInterval(updateClock, 1000);

    // Talkdesk Embedded init
    function sendEventToTD(event, data) {
      const iframe = document.getElementById('td-embedded-iframe');
      if (iframe && iframe.contentWindow) {
        iframe.contentWindow.postMessage({ event, data }, '*');
      }
    }

    document.getElementById('td-embedded-iframe').addEventListener('load', function () {
      sendEventToTD('init_td_embedded', {
        url: window.location.origin,
        int: 'custom-integration',
        env: 'prd-eu',
        acc: 'warrantywise',
        aid: 'agent-id-123',
        view: 'headless',
        app: 'live',
        show_cti_status: 'false'
      });
    });
  </script>

</body>
</html>
